# bmad-create-story override for bmad-linear
# Sparse — only fields changed from stock. Copy to _bmad/custom/bmad-create-story.toml.
# tracking_system is read by the skill after _bmad/lnr/bin/apply-patch.sh is applied (Wave 3 / S6).

[workflow]
tracking_system = "linear"
tracking_adapter = "lnr-tracking-adapter"
status_file = "linear://{linear_project}/work-status"
default_output_file = "linear://{linear_project}/issues/{issue_key}"
persistent_facts = [
  "skill:lnr-session-policy",
  "skill:lnr-tracking-adapter",
  "Tracking system is Linear. Read work-status and issues from the repo-local cache (.cache/linear/, gitignored — work-status.yaml index plus issues/<ID>.yaml); auto-run `_bmad/lnr/tools/linear-sync.sh sync` if cache is missing or > 30 min old. A created issue is tagged to its project-milestone (former BMAD epic) via the issue projectMilestone field; a sub-task is a sub-issue via parentId. Writes (create_issue, update_status, add_comment, set_baseline_commit) go via the lnr-tracking-adapter skill which dispatches the linearis CLI (transport: verify the linearis/Linear flag; project-milestone assignment may require the Linear UI or a future linear-cli verb). Linear is canonical; do not write local work-status.yaml or issue .md files.",
  "skill:doc-spec-gate",
  "skill:doc-read-first",
  "file:{project-root}/_bmad/doc/data/decision-order.md",
  "the manual outranks the code; record+confirm intent before implementing",
]
