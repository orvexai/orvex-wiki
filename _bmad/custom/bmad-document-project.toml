# Sparse override — copy to {project-root}/_bmad/custom/bmad-document-project.toml during install.
# Append-only per BMAD merge rules: only the fields listed here are changed;
# all other bmad-document-project defaults remain in effect.

[workflow]

# Wiki-first activation — runs BEFORE the file-first discovery (skill activation Step 2).
# Orients the workflow to the living manual as the source of truth, so the existence
# check and the amend-vs-create decision are made against the WIKI, not the local files.
activation_steps_prepend = [
  "WIKI-FIRST — this is a living-wiki project and the wiki manual OUTRANKS local files. Before any local-file discovery or existence check, resolve what the manual already holds: invoke skill:doc-read-first for doc_type=project-overview (it runs `docmost-cli search '\"Project Overview: {project_name}\"' --cached --content --space {docmost_space} --output json`, then `docmost-cli page get <slug> --output json`). The project-overview node is frequently the manual root. Treat the wiki page — not the local filesystem — as the source of truth and the PRIMARY existing input.",
  "Report the WIKI status FIRST in your discovery summary (project-overview page: exists or absent; if it exists, its status draft|canonical, slug, and a one-line content summary), then any local artifacts. NEVER conclude 'no project documentation exists' or 'create index.md from the template' from the local filesystem alone — 'exists' means exists in the WIKI.",
  "If the living page EXISTS, load its body in full and run this whole session as AMENDING that one page in place (current-state-only, P4) — build on it; never regenerate from scratch, never flatten its protected story/tldr/'how this manual works' zones, never spawn a dated copy. A local {project_knowledge}/index.md is only a transient working draft reconciled to the wiki. If it is ABSENT, you create it in the wiki at draft when ready (the existing handoff). The wiki stays primary throughout.",
]

# Route the finalized project overview into the living manual after the full-scan or
# deep-dive sub-workflow completes.
# on_complete fires AFTER the local index.md is written as a transient draft.
#
# Decision-order (READ -> FIND-BEFORE-CREATE -> ASK-if-ambiguous -> AMEND-in-place
# as DRAFT -> else CREATE at draft): the finalized artifact is NOT published as a
# new canonical page and is NEVER a dated sibling. It is amended into the one living
# manual node for the project overview (typically the manual root), in place, and
# lands at status: draft pending human ratification. The manual is canonical; the
# local file is a transient working draft.
on_complete = "Route {project_knowledge}/index.md into the project's living manual via the doc-amend skill (skill:doc-amend — it is BUILT and registered; invoke it as the real call. The procedure below is the contract doc-amend runs and the fallback to perform inline ONLY if doc-amend is unavailable). Procedure: (1) READ — resolve the manual node for doc_type=project-overview via doc-read-first (status-filtered, manual root + IA path); (2) FIND-BEFORE-CREATE — locate the existing project-overview node across drafts AND canonical (`docmost-cli search '\"Project Overview: {project_name}\"' --cached --content --space {docmost_space} --output json`; PENDING: upgrade to the synchronous duplicate-check endpoint when built); (3) ASK-if-ambiguous — on a fuzzy candidate, suspend with ONE plain-English question (existing title + a one-line diff) and auto-resume from the reply; (4) AMEND-in-place — when a node exists, capture its updated_at with `docmost-cli page get <slug> --output json` and amend ONLY the affected sections in place with `docmost-cli page patch <slug> --find '<old>' --replace '<new>' --if-version '<updated_at>'`, keeping the body current-state-only (P4) and never rewriting the protected story / tldr / 'how this manual works' transcluded zones (the project-overview node is frequently the manual root — do not flatten its protected story); (5) else CREATE — only when no candidate, `docmost-cli page create 'Project Overview: {project_name}' --space {docmost_space} --parent <project-overview-ia-node-slug> --doc-type project-overview --status draft --content @{project_knowledge}/index.md --output json` (NEVER --status canonical on create). Capture the `url`/`slug` from the receipt and surface it, noting the page lands as DRAFT pending human ratification (doc-ratify) — AI never self-promotes to canonical. The manual node is authoritative — the local file is a transient working draft. If `docmost-cli` is not installed or exits non-zero, WARN the user that manual amend failed, name {project_knowledge}/index.md as the unpublished local draft, and ask the user to retry once docmost-cli is available; do not silently demote the local file to authoritative."

# Load the session taxonomy policy and the project's routing rules once at activation.
persistent_facts = [
  "skill:doc-session-policy",
  "file:{project-root}/_bmad/doc/data/decision-order.md",
]
