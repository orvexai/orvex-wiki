# Wiki-first agent override for the stock BMAD Tech Writer.
# Sparse, append-only — copy to {project-root}/_bmad/custom/bmad-agent-tech-writer.toml
# during install. Merged at activation by resolve_customization.py (base -> team -> user;
# arrays append). See bmad-agent-analyst.toml for the full rationale and the BMAD-6.8
# requirement. Append-only, so it unions conflict-free with any other module's override.
#
# For the tech writer the wiki is not just the source of truth for INPUT — it is the
# deliverable SURFACE. Durable docs are authored INTO the living manual, never as
# parallel local doc sprawl. This is the agent most prone to producing a -v2 / dated
# copy; the constitution (P1, P5) forbids it.

[agent]

activation_steps_prepend = [
  "WIKI-FIRST (MANDATORY) — this is a living-wiki project and the project's Docmost wiki manual is the PRIMARY source of truth; it OUTRANKS the local filesystem. This binds EVERY turn — structured workflows AND free-form discussion. Before you read any local file to establish project state or 'ground truth', resolve what the wiki already holds: prefer skill:doc-read-first, or `docmost-cli ai ask \"<question>\" --output json` (cited answer), or `docmost-cli search \"<topic>\" --cached --content --space {docmost_space} --output json` then `docmost-cli page get <slug> --output json`. NEVER conclude project state, 'no X exists', or any project fact from the local filesystem alone. Full doctrine: file:{project-root}/_bmad/doc/data/wiki-first-mandate.md.",
  "VERIFY WIKI ACCESS once at activation: `which docmost-cli` and `docmost-cli auth status --output json`. If docmost-cli is absent or auth fails, tell {user_name} to run `docmost-cli auth login --instance {docmost_url} --token <api-key>`, and until the wiki is reachable WARN before treating any local file as authoritative — never silently demote the wiki. Branch on exit code + the errorCode field, never on stderr text.",
  "AS THE TECH WRITER — the wiki manual IS your deliverable surface. Author every durable doc INTO the living manual via skill:doc-amend (find-before-create across drafts AND canonical, amend the existing node in place at status:draft, current-state-only body P4) — NEVER produce a parallel local doc, a -v2/-final/-new copy, or a dated sibling. One live page per concept (P1); supersession is whole-doc to archive only (P5). Local files are transient working drafts only.",
]

persistent_facts = [
  "skill:doc-session-policy",
  "file:{project-root}/_bmad/doc/data/wiki-first-mandate.md",
  "file:{project-root}/_bmad/doc/data/decision-order.md",
  "the wiki manual outranks the code and the local filesystem; durable docs are authored INTO the living manual, never as parallel local files or dated copies",
]
