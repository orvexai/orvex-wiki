# Sparse override — copy to {project-root}/_bmad/custom/bmad-ux.toml during install.
# Append-only per BMAD merge rules: only the fields listed here are changed;
# all other bmad-ux defaults remain in effect.

[workflow]

# Wiki-first activation — runs BEFORE the file-first discovery (skill activation Step 2).
# Orients the workflow to the living manual as the source of truth, so the existence
# check and the amend-vs-create decision are made against the WIKI, not the local files.
activation_steps_prepend = [
  "WIKI-FIRST — this is a living-wiki project and the wiki manual OUTRANKS local files. Before any local-file discovery or existence check, resolve what the manual already holds: invoke skill:doc-read-first for doc_type=ux-spec (both facets — it runs `docmost-cli search '\"UX Spec — Design: {project_name}\"' --cached --content --space {docmost_space} --output json` and the same for '\"UX Spec — Experience: {project_name}\"', then `docmost-cli page get <slug> --output json` on each hit). Treat the wiki pages — not the local filesystem — as the source of truth and the PRIMARY existing input.",
  "Report the WIKI status FIRST in your discovery summary (UX Spec Design + Experience pages: exists or absent; if they exist, status draft|canonical, slug, and a one-line content summary each), then any local artifacts. NEVER conclude 'no UX spec exists' or 'create DESIGN.md/EXPERIENCE.md from the template' from the local filesystem alone — 'exists' means exists in the WIKI.",
  "If a living page EXISTS, load its body in full and run this whole session as AMENDING that one page in place (current-state-only, P4) — build on it; never regenerate from scratch or spawn a dated copy. The local {doc_workspace}/DESIGN.md and {doc_workspace}/EXPERIENCE.md are only transient working drafts reconciled to the wiki. If a page is ABSENT, you create it in the wiki at draft when ready (the existing handoff). The wiki stays primary throughout.",
]

# Route the finalized UX spec outputs into the living manual at Finalize (polish + handoff + close step).
# Runs after polish, before the final user-facing message.
# bmad-ux produces DESIGN.md and EXPERIENCE.md; both are routed.
#
# Decision-order (READ -> FIND-BEFORE-CREATE -> ASK-if-ambiguous -> AMEND-in-place
# as DRAFT -> else CREATE at draft): the finalized artifacts are NOT published as new
# canonical pages and are NEVER dated siblings. Each is amended into the one living
# manual node for its ux-spec content, in place, landing at status: draft pending
# human ratification. The manual is canonical; the local files are transient working drafts.
external_handoffs = [
  "After finalize, route the UX spec outputs into the project's living manual via the doc-amend skill (skill:doc-amend — it is BUILT and registered; invoke it as the real call. The procedure below is the contract doc-amend runs and the fallback to perform inline ONLY if doc-amend is unavailable). Run the procedure once per file. For DESIGN.md: (1) READ — resolve the manual node for doc_type=ux-spec (Design facet) via doc-read-first (status-filtered, manual root + IA path); (2) FIND-BEFORE-CREATE — locate the existing UX Spec — Design node across drafts AND canonical (`docmost-cli search '\"UX Spec — Design: {project_name}\"' --cached --content --space {docmost_space} --output json`; PENDING: upgrade to the synchronous duplicate-check endpoint when built); (3) ASK-if-ambiguous — on a fuzzy candidate, suspend with ONE plain-English question (existing title + a one-line diff) and auto-resume; (4) AMEND-in-place — when a node exists, capture its updated_at with `docmost-cli page get <slug> --output json` and amend ONLY the affected sections in place with `docmost-cli page patch <slug> --find '<old>' --replace '<new>' --if-version '<updated_at>'`, keeping the body current-state-only (P4) and never rewriting the protected story / tldr / 'how this manual works' transcluded zones; (5) else CREATE — only when no candidate, `docmost-cli page create 'UX Spec — Design: {project_name}' --space {docmost_space} --parent <ux-spec-ia-node-slug> --doc-type ux-spec --status draft --content @{doc_workspace}/DESIGN.md --output json` (NEVER --status canonical on create). Then route EXPERIENCE.md the same way against its own living node (search/amend '\"UX Spec — Experience: {project_name}\"'; create as a draft sibling under the same ux-spec IA node only if none exists). Capture the `url`/`slug` from each receipt and surface both, noting the pages land as DRAFT pending human ratification (doc-ratify) — AI never self-promotes to canonical. The manual nodes are authoritative — the local files are transient working drafts. If `docmost-cli` is not installed or exits non-zero, WARN the user that manual amend failed, name {doc_workspace}/DESIGN.md and {doc_workspace}/EXPERIENCE.md as unpublished local drafts, and ask the user to retry once docmost-cli is available; do not silently demote the local files to authoritative.",
]

# Load the session taxonomy policy and the project's routing rules once at activation.
persistent_facts = [
  "skill:doc-session-policy",
  "file:{project-root}/_bmad/doc/data/decision-order.md",
]
