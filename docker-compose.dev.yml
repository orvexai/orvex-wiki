# Local prod-parity environment — Foundation M2 (infra tier only; the app runs
# on the host via `make run-local` / `pnpm dev`).
#
# Engine-faithful to this repo's ACTUAL deploy claims (deploy/kustomize):
#   - Postgres 17, CNPG image family  (platform-resources/postgres-claim.yaml)
#   - Redis 8.x with password auth    (platform-resources/redis-claim.yaml)
#   - S3-compatible object store      (app-manifests/object-storage-claim.yaml;
#     Ceph RGW in-cluster -> MinIO locally, path-style, same bucket name shape)
# NO MongoDB (locked platform decision D-S12: Postgres-only event data).
# NO local Kafka yet: the deploy tree claims no broker today; the studio-spine
# outbox relay is delivery work (D-S13) and the broker joins this file with it.
#
# Credentials come from .env.dev (generated by scripts/dev-secrets.sh, never
# committed). Invoke through the Makefile, which passes --env-file .env.dev.
# Host ports are deliberately non-default (55432/56379/59000) to avoid
# colliding with other local stacks; `make env-info` prints everything.

name: orvex-wiki-dev

services:
  postgres:
    # Engine-faithful = same PG major as the CNPG claim (version "17" in
    # postgres-claim.yaml). The CNPG image itself (postgresql:17-standard-trixie)
    # is operator-driven — no standalone docker-entrypoint (verified: exits 0
    # with no logs) — so local uses the official image at the same major.
    image: postgres:17-trixie
    environment:
      POSTGRES_DB: orvex-wiki
      POSTGRES_USER: orvex-wiki
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:?generate .env.dev with scripts/dev-secrets.sh}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orvex-wiki -d orvex-wiki"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8
    command:
      [
        "redis-server",
        "--requirepass",
        "${DEV_REDIS_PASSWORD:?generate .env.dev with scripts/dev-secrets.sh}",
        "--appendonly",
        "yes",
      ]
    ports:
      - "127.0.0.1:56379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_HEALTH_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
    environment:
      REDIS_HEALTH_PASSWORD: ${DEV_REDIS_PASSWORD}

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${DEV_MINIO_ROOT_USER:?generate .env.dev with scripts/dev-secrets.sh}
      MINIO_ROOT_PASSWORD: ${DEV_MINIO_ROOT_PASSWORD:?generate .env.dev with scripts/dev-secrets.sh}
    ports:
      - "127.0.0.1:59000:9000"
      - "127.0.0.1:59001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: create the bucket (parity with the ObjectStorageClaim's
  # <app>-bucket naming), then exit 0.
  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${DEV_MINIO_ROOT_USER}\" \"$${DEV_MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing local/orvex-wiki-bucket &&
      echo 'bucket orvex-wiki-bucket ready'
      "
    environment:
      DEV_MINIO_ROOT_USER: ${DEV_MINIO_ROOT_USER}
      DEV_MINIO_ROOT_PASSWORD: ${DEV_MINIO_ROOT_PASSWORD}
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
