---
# Infrastructure credential generation + push to OpenBao (Postgres + Redis).
# Mirrors the proven orvex-studio-identity flow:
#   Wave 1: Password generator creates a random password
#   Wave 2: PushSecret writes username/password/host/(database) to OpenBao
#           (IfNotExists — stable across resyncs)
#   Wave 3: db-bootstrap ExternalSecret + Postgres/Redis claims consume it
#   Wave 4: db-credentials/redis-credentials ExternalSecret composes the app DSN
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: orvex-wiki-postgres-password
  namespace: orvex-wiki
  labels:
    app.kubernetes.io/name: orvex-wiki
    app.kubernetes.io/component: password-generator
    app.kubernetes.io/part-of: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  length: 32
  digits: 8
  symbols: 0
  allowRepeat: true
  noUpper: false
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: orvex-wiki-postgres-credentials-push
  namespace: orvex-wiki
  labels:
    app.kubernetes.io/name: orvex-wiki
    app.kubernetes.io/component: push-secret
    app.kubernetes.io/part-of: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: "0"
  updatePolicy: IfNotExists
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao-apps
      kind: ClusterSecretStore
  selector:
    generatorRef:
      apiVersion: generators.external-secrets.io/v1alpha1
      kind: Password
      name: orvex-wiki-postgres-password
  template:
    engineVersion: v2
    mergePolicy: Replace
    data:
      username: orvex-wiki
      database: orvex-wiki
      # CNPG read-write Service for this instance, in the env namespace
      # (composition names it postgres-<claim>-rw). NAMESPACE is replaced by
      # the kustomization (delimiter "." index 1).
      host: postgres-orvex-wiki-postgres-rw.PLACEHOLDER_NAMESPACE.svc.cluster.local
  data:
    - conversionStrategy: None
      match:
        secretKey: password
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/postgres
          property: password
    - conversionStrategy: None
      match:
        secretKey: username
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/postgres
          property: username
    - conversionStrategy: None
      match:
        secretKey: database
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/postgres
          property: database
    - conversionStrategy: None
      match:
        secretKey: host
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/postgres
          property: host
---
# ═══════════════════════════════════════════════════════════════════════════════
# REDIS CREDENTIALS
#   Wave 1: Password generator
#   Wave 2: PushSecret → OpenBao apps/<appNamespace>/redis (host/port/password)
#   Wave 3: redis-claim provisions; the redis pod mounts REDIS_PASSWORD from the
#           redis-credentials Secret created at wave 4
#   Wave 4: orvex-wiki-redis-credentials ExternalSecret (external-secrets.yaml)
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: orvex-wiki-redis-password
  namespace: orvex-wiki
  labels:
    app.kubernetes.io/name: orvex-wiki
    app.kubernetes.io/component: password-generator
    app.kubernetes.io/part-of: redis
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  length: 32
  digits: 8
  symbols: 0
  allowRepeat: true
  noUpper: false
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: orvex-wiki-redis-credentials-push
  namespace: orvex-wiki
  labels:
    app.kubernetes.io/name: orvex-wiki
    app.kubernetes.io/component: push-secret
    app.kubernetes.io/part-of: redis
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: "0"
  updatePolicy: IfNotExists
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao-apps
      kind: ClusterSecretStore
  selector:
    generatorRef:
      apiVersion: generators.external-secrets.io/v1alpha1
      kind: Password
      name: orvex-wiki-redis-password
  template:
    engineVersion: v2
    mergePolicy: Replace
    data:
      port: "6379"
      # Redis Service for this instance, in the env namespace (composition names
      # it redis-<claim>). NAMESPACE is replaced by the kustomization.
      host: redis-orvex-wiki-redis.PLACEHOLDER_NAMESPACE.svc.cluster.local
  data:
    - conversionStrategy: None
      match:
        secretKey: password
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/redis
          property: password
    - conversionStrategy: None
      match:
        secretKey: host
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/redis
          property: host
    - conversionStrategy: None
      match:
        secretKey: port
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/redis
          property: port
