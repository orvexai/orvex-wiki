---
# APP_SECRET — self-provisioned via a Password generator + PushSecret, same
# shape as the Postgres/Redis credential flow above. Docmost requires
# APP_SECRET to be a string >= 32 chars that is NOT the literal placeholder
# "REPLACE_WITH_LONG_SECRET" (apps/server/src/integrations/environment/
# environment.validation.ts) — a 48-char generated password satisfies both.
#
#   Wave 1: Password generator
#   Wave 2: PushSecret → OpenBao apps/<appNamespace>/app (IfNotExists — stable
#           across resyncs, so the app's session/cookie signing key never
#           rotates out from under existing sessions on a resync)
#   Wave 4: orvex-wiki-app-secret ExternalSecret (external-secrets.yaml) pulls
#           it back into the docmost-secret Secret consumed by the Deployment
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: orvex-wiki-app-secret-password
  namespace: orvex-wiki
  labels:
    app.kubernetes.io/name: orvex-wiki
    app.kubernetes.io/component: password-generator
    app.kubernetes.io/part-of: app-secret
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  length: 48
  digits: 8
  symbols: 0
  allowRepeat: true
  noUpper: false
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: orvex-wiki-app-secret-push
  namespace: orvex-wiki
  labels:
    app.kubernetes.io/name: orvex-wiki
    app.kubernetes.io/component: push-secret
    app.kubernetes.io/part-of: app-secret
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: "0"
  updatePolicy: IfNotExists
  deletionPolicy: None
  secretStoreRefs:
    - name: openbao-apps
      kind: ClusterSecretStore
  selector:
    generatorRef:
      apiVersion: generators.external-secrets.io/v1alpha1
      kind: Password
      name: orvex-wiki-app-secret-password
  data:
    - conversionStrategy: None
      match:
        secretKey: password
        remoteRef:
          remoteKey: PLACEHOLDER_APP_NAME/app
          property: app_secret
