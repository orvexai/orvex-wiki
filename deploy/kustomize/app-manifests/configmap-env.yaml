---
# Non-secret configuration for orvex-wiki (vanilla Docmost v0.95.0).
# Secret values (DATABASE_URL, REDIS_URL, APP_SECRET, S3 access keys) are
# delivered separately via ExternalSecrets / the ObjectStorageClaim-generated
# secret (see external-secrets.yaml + object-storage-claim.yaml).
#
# NODE_ENV=production is deliberate: apps/server's `pnpm start` -> start:prod
# sets NODE_ENV=production, which makes DatabaseModule.onApplicationBootstrap()
# run migrationService.migrateToLatest() automatically on container boot — no
# separate migration Job/initContainer needed for this deploy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: orvex-wiki-env
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "5"
data:
  APP_URL: "https://PLACEHOLDER_WIKI_HOST"
  PORT: "3000"
  NODE_ENV: "production"
  STORAGE_DRIVER: "s3"
  FILE_UPLOAD_SIZE_LIMIT: "50mb"
  # S3 object storage — access keys + bucket name are sourced directly from
  # the OBC-generated secret/configmap (orvex-wiki-s3-bucket) in the
  # Deployment's env:. PLACEHOLDER_S3_ENDPOINT is replaced by Kustomize.
  AWS_S3_ENDPOINT: "PLACEHOLDER_S3_ENDPOINT"
  AWS_S3_REGION: "us-east-1"
  AWS_S3_FORCE_PATH_STYLE: "true"

  # ═══════════════════════════════════════════════════════════════════════
  # Orvex TARGET config (scaffold). These keys are IGNORED by the vanilla
  # v0.95 engine — its env validation (environment.validation.ts) whitelists
  # only its own declared vars and drops unknown keys, so injecting these is
  # boot-safe. The additive orvex/* modules read them ONLY when
  # ORVEX_MODULES_ENABLED=true (OrvexRootModule.register, off by default).
  # ═══════════════════════════════════════════════════════════════════════

  # Orvex module master switch — ON: modules cutover 2026-07-14 (PO Daniel).
  # Prod satellites deployed + seam URLs wired; dev cell verified 5/6 surfaces green
  # (rag/knowledge-sync/cross-cutting/api/ai-inline PASS; mcp modify-existing tool bug
  # + cited-ask entitlement-grant tracked separately). Revert = set back to "false".
  ORVEX_MODULES_ENABLED: "true"

  # Multi-tenant CLOUD cell — federated per-tenant workspace resolution
  # (ENG-1559 / FR-W6), matching the dev overlay (components/staging). In
  # self-hosted mode (CLOUD unset/false) DomainMiddleware clobbers every
  # request's workspace to workspaceRepo.findFirst() (the OLDEST workspace),
  # so a federated tenant-scoped session token whose workspaceId != that
  # oldest workspace is rejected by JwtStrategy with 401 "Workspace does not
  # match" — blocking ALL multi-tenant writes/reads via api/mcp/ai/rag on
  # prod. CLOUD=true switches DomainMiddleware to hostname-subdomain
  # resolution: the cell host (wiki.eu1.orvex.ai) and the in-cluster host
  # match no workspace hostname (all prod workspaces have hostname=null) ->
  # req.workspaceId falls through to the request's own signature-verified
  # session/api_key token -> the token's own workspace is authoritative ->
  # JwtStrategy passes with real per-tenant isolation. SUBDOMAIN_HOST is
  # intentionally NOT set (DomainMiddleware resolves the tenant from
  # host.split(".")[0], never from SUBDOMAIN_HOST). Revert = remove this key.
  CLOUD: "true"

  # Cell contract (A-CELL rule #4) — /healthz echoes CELL_ID + CLUSTER_NAME.
  # Filled by the root replacements from cluster-config.cellId / clusterName;
  # base = the sentinel "solo" (dev/crew/standalone run cell-enforcement-free).
  CELL_ID: "PLACEHOLDER_CELL_ID"
  CLUSTER_NAME: "PLACEHOLDER_CLUSTER_NAME"

  # Public short cell token (ENG-1505 fix-pass single source: cluster-config
  # data.cellToken). Not consumed by the engine itself — this ConfigMap is
  # the relay that carries the token PAST the base build (cluster-config.yaml
  # is local-config: true and is pruned from the render) so that
  # components/staging's own `replacements` can re-derive the dev HTTPRoute's
  # host/annotation/sectionName from the SAME single source instead of
  # re-typing the literal.
  CELL_TOKEN: "PLACEHOLDER_CELL_TOKEN"

  # Event-spine crew-scoping (A-CELL rule #5). The engine is the first
  # studio-spine producer; topics are {domain}-events.{suffix}. Base = the
  # sentinel cell "solo"; components/crew patches to crew-{name} so a crew's
  # Kafka spine is its own. NOT a replacement target (a crew patch survives).
  EVENT_TOPIC_SUFFIX: "solo"

  # ── Studio-spine producer: broker + topic (prod parity) ──────────────────
  # The OutboxRelayService (ENG-1383) is mounted UNCONDITIONALLY (carve-out-b,
  # like the migrator) — it does NOT ride the ORVEX_MODULES_ENABLED gate — so
  # the ONLY thing that connects the producer is these two keys. Base
  # previously left both unset, so on prod EnvironmentService.getKafkaBrokers()
  # fell back to its localhost:9092 sentinel (unreachable → the relay logged
  # KafkaJSNumberOfRetriesExceeded and buffered every row) and
  # getKafkaOutboxTopic() fell back to the "orvex.studio-spine.events" sentinel
  # (a topic nothing reads). These values were only ever set on the dev overlay
  # (components/staging); this promotes them to the base so PROD publishes too.
  #   - KAFKA_BROKERS: the shared Strimzi plaintext bootstrap (:9092), the SAME
  #     endpoint the knowledge indexer/SSE + KafkaSinks dial (ENG-2006).
  #   - KAFKA_OUTBOX_TOPIC: wiki-events.eu-central-1 — the live KafkaTopic the
  #     knowledge INDEXER consumes; must match or nothing indexes.
  # Crash-safe: a broker outage never blocks a mutation (the outbox buffers,
  # retried never dropped). components/staging keeps its identical `op: add`
  # patches (harmless override to the same values on dev); components/crew
  # isolates its own spine via EVENT_TOPIC_SUFFIX.
  KAFKA_BROKERS: "platform-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_OUTBOX_TOPIC: "wiki-events.eu-central-1"

  # ── Product-family-agnostic sibling seam (A-PORTABLE) — every platform
  # dependency is a CONFIGURED URL, never a hard-coded Studio host. A
  # standalone/embedded wiki points these at its OWN instances. Base = prod
  # cluster-local Services; components/staging → dev; components/crew → the
  # sibling's OWN crew host (crew → crew, crew-design.md). NOT replacement
  # targets, so overlay patches on them survive the build.
  ORVEX_IDENTITY_URL: "http://orvex-studio-identity.orvex-studio-identity.svc.cluster.local"
  ORVEX_KNOWLEDGE_URL: "http://orvex-studio-knowledge.orvex-studio-knowledge.svc.cluster.local"
  ORVEX_AI_URL: "http://orvex-studio-ai.orvex-studio-ai.svc.cluster.local"
  # Billing keys off the seam pattern deliberately: the live consumer is the
  # EntitlementModule's HttpBillingEntitlementPort, which reads ORVEX_BILLING_API_URL
  # (ENG-1382; environment.service.ts getBillingApiUrl) — so this base URL (billing's
  # /v1/entitlements host) is carried under that exact key, never ..._URL. Renamed
  # from the former dead ORVEX_BILLING_URL scaffold (no code ever read it) at the
  # ENG-1559 M5 billing-wire close — a single live key, no fallback.
  ORVEX_BILLING_API_URL: "http://orvex-studio-billing.orvex-studio-billing.svc.cluster.local"
  ORVEX_MCP_URL: "http://orvex-studio-mcp.orvex-studio-mcp.svc.cluster.local"
  ORVEX_CONSOLE_URL: "http://orvex-studio-console.orvex-studio-console.svc.cluster.local"
  ORVEX_WIKI_API_URL: "http://orvex-wiki-api.orvex-wiki-api.svc.cluster.local"

  # ENG-1599 — OTel trace export (A-OBSERVE "OTel to LGTM (console)"). A
  # configured URL, never a credential (A-PORTABLE); read ONLY by
  # `initOrvexTracing`, itself gated on ORVEX_MODULES_ENABLED==='true' (off
  # above, so this key is inert here — VANILLA BYTE-PARITY DOCTRINE). Base =
  # the prod cluster-local OTLP/HTTP collector; components/staging → dev;
  # components/crew → the crew's own collector, same crew → crew seam as the
  # ORVEX_*_URL block above.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.orvex-studio-console.svc.cluster.local:4318"
