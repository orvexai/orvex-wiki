---
# Observability baseline — Foundation M5 (A-OBSERVE / CS §10).
#
# HONEST SCOPE: the engine exposes no /metrics endpoint yet (vanilla v0.95).
# Everything here runs on REAL, already-collected signals: kube-state-metrics
# + cAdvisor via the platform's k8s-monitoring chart -> Mimir. App-level
# metrics (HTTP latency/error rates, outbox relay lag heartbeat) land with
# delivery (OTLP -> Mimir, CS §10 telemetry split) and extend these resources.
#
# Conventions copied from the platform (my-idp):
#  - PrometheusRule needs labels prometheus:k8s + role:alert-rules for the
#    Mimir Ruler to pick it up.
#  - Dashboards ship as a ConfigMap (JSON) + GrafanaDashboard CR with
#    instanceSelector dashboards:grafana; allowCrossNamespaceImport lets this
#    app-namespace CR bind the Grafana instance in the platform-owned
#    `observability` namespace (which stays read-only to us).
#
# Namespace scoping: alert exprs match namespace=~"orvex-wiki(-.+)?" so the
# SAME manifest works in prod (orvex-wiki), dev (orvex-wiki-dev) and crew
# namespaces. When several environments ship identical rules, the resulting
# alerts carry identical labels per firing namespace and Alertmanager
# deduplicates; evaluation is duplicated (cheap), alerting is not.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: orvex-wiki-alerts
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  labels:
    prometheus: k8s # REQUIRED: Mimir Ruler discovery
    role: alert-rules # REQUIRED: Mimir Ruler discovery
    app.kubernetes.io/component: observability
spec:
  groups:
    - name: orvex-wiki-workload
      interval: 30s
      rules:
        - alert: OrvexWikiDeploymentDown
          expr: >
            kube_deployment_status_replicas_available{namespace=~"orvex-wiki(-.+)?", deployment="orvex-wiki"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "orvex-wiki has ZERO available replicas in {{ $labels.namespace }}"
            description: "No orvex-wiki pod has been available for 5 minutes in namespace {{ $labels.namespace }} — the wiki is down in that environment."
        - alert: OrvexWikiDeploymentDegraded
          expr: >
            kube_deployment_status_replicas_available{namespace=~"orvex-wiki(-.+)?", deployment="orvex-wiki"}
              < kube_deployment_spec_replicas{namespace=~"orvex-wiki(-.+)?", deployment="orvex-wiki"}
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "orvex-wiki below desired replicas in {{ $labels.namespace }}"
            description: "Available replicas have been below spec for 15 minutes in {{ $labels.namespace }}."
        - alert: OrvexWikiPodCrashLooping
          expr: >
            increase(kube_pod_container_status_restarts_total{namespace=~"orvex-wiki(-.+)?"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping in {{ $labels.namespace }}"
            description: "Container {{ $labels.container }} restarted more than 3 times in 15 minutes."
        - alert: OrvexWikiPodOOMKilled
          expr: >
            kube_pod_container_status_last_terminated_reason{namespace=~"orvex-wiki(-.+)?", reason="OOMKilled"} == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} was OOMKilled in {{ $labels.namespace }}"
            description: "Container {{ $labels.container }} last terminated with OOMKilled — check the 1Gi memory limit vs actual working set."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orvex-wiki-workload-dashboard
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  labels:
    app.kubernetes.io/component: observability
data:
  orvex-wiki-workload.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus"
        }
      ],
      "title": "orvex-wiki — workload health",
      "uid": "orvex-wiki-workload",
      "tags": ["orvex-wiki"],
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(kube_deployment_spec_replicas{deployment=\"orvex-wiki\"}, namespace)",
            "current": { "text": "orvex-wiki", "value": "orvex-wiki" },
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Replicas: available vs desired",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"$namespace\", deployment=\"orvex-wiki\"}",
              "legendFormat": "available"
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"$namespace\", deployment=\"orvex-wiki\"}",
              "legendFormat": "desired"
            }
          ]
        },
        {
          "id": 2,
          "title": "Container restarts (1h increase)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}[1h]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "CPU usage by pod (cores)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Memory working set by pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"$namespace\", container!=\"\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: orvex-wiki-workload
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  labels:
    app.kubernetes.io/component: observability
spec:
  # Binds the platform Grafana instance (observability ns) from THIS app
  # namespace — the operator's designed cross-namespace mechanism.
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: Orvex
  configMapRef:
    name: orvex-wiki-workload-dashboard
    key: orvex-wiki-workload.json
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Mimir"
