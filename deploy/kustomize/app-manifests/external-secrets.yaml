---
# ExternalSecrets for orvex-wiki — pulled from OpenBao via ClusterSecretStores.
#
# Secret flow (mirrors orvex-studio-identity):
#   Wave 1: Postgres/Redis/app-secret Password generators (platform-resources/)
#   Wave 2: PushSecret → OpenBao apps/<appNamespace>/{postgres,redis,app}
#   Wave 3: db-bootstrap ExternalSecret (CNPG initdb) + Postgres/Redis claims
#   Wave 4: db-credentials/redis-credentials (composed), app-secret, harbor
#   Wave 5: ConfigMap, Service
#   Wave 6: Deployment

# ═══════════════════════════════════════════════════════════════════════════════
# POSTGRESQL BOOTSTRAP SECRET (for the CloudNativePG initdb)
# Renders to `<appNamespace>-db-bootstrap`, in lockstep with the claim's
# credentialsSecretName (see kustomization.yaml replacements).
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orvex-wiki-db-bootstrap
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-apps
  target:
    name: PLACEHOLDER_APP_NAME-db-bootstrap
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/postgres
        property: username
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/postgres
        property: password
---
# ═══════════════════════════════════════════════════════════════════════════════
# POSTGRESQL CREDENTIALS — composed DATABASE_URL (required by Docmost's
# environment.validation.ts: valid postgres:// / postgresql:// URL) plus the
# individual keys.
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orvex-wiki-db-credentials
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-apps
  target:
    name: orvex-wiki-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      mergePolicy: Replace
      engineVersion: v2
      data:
        DATABASE_URL: "postgres://{{ .username }}:{{ .password }}@{{ .host }}:5432/{{ .database }}?sslmode=no-verify"
  data:
    - secretKey: username
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/postgres
        property: username
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/postgres
        property: password
    - secretKey: host
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/postgres
        property: host
    - secretKey: database
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/postgres
        property: database
---
# ═══════════════════════════════════════════════════════════════════════════════
# REDIS CREDENTIALS — composed REDIS_URL (required by Docmost's
# environment.validation.ts: valid redis:// / rediss:// URL). Pulled from
# OpenBao apps/<appNamespace>/redis (populated by the wave-2 PushSecret).
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orvex-wiki-redis-credentials
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-apps
  target:
    name: orvex-wiki-redis-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      mergePolicy: Replace
      engineVersion: v2
      data:
        REDIS_URL: "redis://:{{ .password }}@{{ .host }}:{{ .port }}"
        # REDIS_PASSWORD is required by the RedisInstanceClaim's
        # credentialsSecretKey (the redis-operator reads it to set redis AUTH);
        # HOST/PORT included for completeness. docmost itself uses REDIS_URL.
        REDIS_HOST: "{{ .host }}"
        REDIS_PORT: "{{ .port }}"
        REDIS_PASSWORD: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/redis
        property: host
    - secretKey: port
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/redis
        property: port
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/redis
        property: password
---
# ═══════════════════════════════════════════════════════════════════════════════
# APP_SECRET — Docmost's cookie/session signing key (required, >=32 chars,
# must not equal the "REPLACE_WITH_LONG_SECRET" placeholder). Pulled from
# OpenBao apps/<appNamespace>/app (populated by the wave-2 PushSecret in
# platform-resources/app-secret-credentials.yaml).
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orvex-wiki-app-secret
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-apps
  target:
    name: orvex-wiki-app-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: APP_SECRET
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/app
        property: app_secret
---
# ═══════════════════════════════════════════════════════════════════════════════
# INTERNAL_API_BEARER_TOKEN — the fail-closed shared bearer that guards every
# `/internal/*` route (ENG-1957 InternalApiAuthGuard; the M5 knowledge seam,
# ENG-1559). `orvex-studio-knowledge` presents the SAME value as its
# ENGINE_API_KEY (its own OpenBao apps/<its-appNamespace>/engine:api-key) —
# the two are ONE paired, machine-generated shared secret (seed-token
# precedent). Pulled from OpenBao apps/<appNamespace>/internal-api
# (PLACEHOLDER_APP_NAME rewritten per-env by the root kustomization). Until
# this secret exists the guard denies every /internal/* call by design
# (deny-by-default; AC5).
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orvex-wiki-internal-api
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-apps
  target:
    name: orvex-wiki-internal-api
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: INTERNAL_API_BEARER_TOKEN
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: PLACEHOLDER_APP_NAME/internal-api
        property: bearer-token
---
# ═══════════════════════════════════════════════════════════════════════════════
# HARBOR REGISTRY CREDENTIALS — image pulls for the Deployment.
# Fixed shared OpenBao path (harbor/admin) — EXCLUDED (by name) from the
# appNamespace-keyed ExternalSecret path replacement in kustomization.yaml.
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-registry-credentials
  namespace: orvex-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/component: registry-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-backend
  target:
    name: harbor-registry-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      mergePolicy: Replace
      data:
        .dockerconfigjson: |
          {"auths":{"repos.eu-central-1.myidp.cloud":{"username":"admin","password":"{{ .password }}","auth":"{{ printf "admin:%s" .password | b64enc }}"},"repos-direct.eu-central-1.myidp.cloud":{"username":"admin","password":"{{ .password }}","auth":"{{ printf "admin:%s" .password | b64enc }}"}}}
  data:
    - secretKey: password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        key: harbor/admin
        property: password
