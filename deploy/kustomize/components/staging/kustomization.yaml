---
# Staging component — the standing dev environment (branch: dev).
# Appended by the CMP plugin when RESOURCE_PROFILE=staging.
#
# Owns the dev hostname (wiki.<cell-token>.orvex.dev) and a single replica
# for the server Deployment.
#
# Dev lives on the orvex.dev zone (NOT a dev-* subdomain of orvex.ai): prod =
# wiki.orvex.ai, dev = wiki.<cell-token>.orvex.dev. The orvex.dev zone
# (external-dns filter + *.orvex.dev Cloudflare Origin cert +
# platform-gateway orvex-dev-https listener) is wired in the my-idp platform
# repo and is LIVE.
# Cell TOKEN ruling (final form 2026-07-05): the public host carries the short
# cell token; the AWS-AZ cell id (eu-central-1a) is internal-only.
# The CELLTOKEN placeholder in the patches below is NOT the literal — the
# `replacements` block at the end of this file overwrites it from
# cluster-config.yaml's single-source `cellToken` field, relayed via
# orvex-wiki-env's CELL_TOKEN (see root kustomization.yaml for why the relay
# hop is needed) (ENG-1505 fix-pass).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

labels:
  - pairs:
      orvex-wiki.orvex.ai/resource-profile: staging  # cell-lint-allow: label namespace key, not a URL
    includeSelectors: false

patches:
  # ── Dev hostname: wiki.orvex.ai → wiki.CELLTOKEN.orvex.dev ───────────────
  # Also re-pin the Gateway listener: the base attaches to the
  # orvex-CELLTOKEN-https listener; the dev host only intersects the
  # orvex-CELLTOKEN-dev-https listener, so the sectionName MUST switch too or
  # the route is Accepted=False (hostname/listener mismatch). CELLTOKEN is a
  # placeholder — see the `replacements` block below for the single-source
  # substitution.
  - patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: wiki.CELLTOKEN.orvex.dev  # cell-lint-allow: own public host (HTTPRoute/APP_URL), not a peer
      - op: replace
        path: /metadata/annotations/external-dns.alpha.kubernetes.io~1hostname
        value: wiki.CELLTOKEN.orvex.dev  # cell-lint-allow: own public host (HTTPRoute/APP_URL), not a peer
      - op: replace
        path: /spec/parentRefs/0/sectionName
        value: orvex-CELLTOKEN-dev-https
    target:
      kind: HTTPRoute
      name: orvex-wiki

  # ── Dev APP_URL: prod host → the dev host ────────────────────────────────
  - patch: |-
      - op: replace
        path: /data/APP_URL
        value: https://wiki.CELLTOKEN.orvex.dev  # cell-lint-allow: own public host (HTTPRoute/APP_URL), not a peer
    target:
      kind: ConfigMap
      name: orvex-wiki-env

  # ── Dev cell = MULTI-TENANT CLOUD: federated workspace resolution ─────────
  # M5 (ENG-1559) / FR-W6. The dev cell is a multi-tenant CLOUD deployment
  # (per-tenant workspace UUIDs from the registry; federated identity via the
  # engine session-mint). In self-hosted mode DomainMiddleware clobbers every
  # request's workspace to workspaceRepo.findFirst() (the OLDEST workspace), so a
  # federated tenant-scoped session token whose workspaceId != that oldest
  # workspace is rejected by JwtStrategy with 401 "Workspace does not match".
  # CLOUD=true switches DomainMiddleware to hostname-subdomain resolution: a
  # cluster-internal / cell host matches no workspace hostname -> req.workspaceId
  # = null -> the token's own workspace is authoritative -> JwtStrategy passes.
  # SUBDOMAIN_HOST is intentionally NOT set here: DomainMiddleware resolves the
  # tenant from host.split(".")[0], never from SUBDOMAIN_HOST; the var only backs
  # cloud cookie-domain / URL construction and, when absent, @IsOptional skips its
  # boot-time @IsUrl check. Wiring it via the single-source cellToken chain (so it
  # renders clean, not with the underscore-bearing PLACEHOLDER_CELL_TOKEN a
  # staging-time replacement would leave — which would fail @IsUrl and crash boot)
  # is a tracked follow-up, not needed for federated workspace resolution.
  - patch: |-
      - op: add
        path: /data/CLOUD
        value: "true"
    target:
      kind: ConfigMap
      name: orvex-wiki-env

  # ── Dev siblings: prod cluster-local Services → the dev namespaces ───────
  # The dev integration env talks to dev siblings (ORVEX_<SVC>_URL seam).
  # Inert under the vanilla engine (ORVEX_MODULES_ENABLED=false); wired for the
  # target orvex/* modules. NOT replacement targets, so these patches survive.
  - patch: |-
      - op: replace
        path: /data/ORVEX_IDENTITY_URL
        value: http://orvex-studio-identity.orvex-studio-identity-dev.svc.cluster.local
      - op: replace
        path: /data/ORVEX_KNOWLEDGE_URL
        value: http://orvex-studio-knowledge.orvex-studio-knowledge-dev.svc.cluster.local
      - op: replace
        path: /data/ORVEX_AI_URL
        value: http://orvex-studio-ai.orvex-studio-ai-dev.svc.cluster.local
      - op: replace
        path: /data/ORVEX_BILLING_API_URL
        value: http://orvex-studio-billing.orvex-studio-billing-dev.svc.cluster.local
      - op: replace
        path: /data/ORVEX_MCP_URL
        value: http://orvex-studio-mcp.orvex-studio-mcp-dev.svc.cluster.local
      - op: replace
        path: /data/ORVEX_CONSOLE_URL
        value: http://orvex-studio-console.orvex-studio-console-dev.svc.cluster.local
      - op: replace
        path: /data/ORVEX_WIKI_API_URL
        value: http://orvex-wiki-api.orvex-wiki-api-dev.svc.cluster.local
    target:
      kind: ConfigMap
      name: orvex-wiki-env

  # ── Dev studio-spine producer: connect the outbox relay to the live broker ──
  # M5 (ENG-1559). The engine's outbox relay (ENG-1383 OutboxRelayService) is the
  # first studio-spine producer: PageRepo.insertPage / OrvexPageProvenanceService
  # enqueue a row in-transaction on every page create/content-update, and the 2s
  # @Interval poller publishes each row to Kafka. That relay is mounted
  # UNCONDITIONALLY in app.module.ts — it deliberately does NOT ride the
  # ORVEX_MODULES_ENABLED gate (carve-out-(b), same as the migrator) — so the
  # ONLY thing keeping the producer "off" in dev is the broker list: base leaves
  # KAFKA_BROKERS unset, so EnvironmentService.getKafkaBrokers() falls back to its
  # localhost:9092 sentinel (an unreachable broker) and dev pages never leave the
  # outbox. Point it at the shared Strimzi bootstrap — the SAME plaintext :9092
  # endpoint the knowledge SSE + KafkaSinks already dial (ENG-2006 canonical
  # value) — so the producer connects and drains. Crash-safe: a broker outage
  # never blocks a mutation (the outbox buffers, retried never dropped), so this
  # is safe even before the studio-spine topic/bridge lands downstream. NOT a
  # replacement target; `op: add` because base carries no KAFKA_BROKERS key.
  - patch: |-
      - op: add
        path: /data/KAFKA_BROKERS
        value: platform-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
    target:
      kind: ConfigMap
      name: orvex-wiki-env

  # ── Single replica for the server Deployment in dev ──────────────────────
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: orvex-wiki

  # ── Neutralize the PDB in dev: a 1-replica pod must stay freely disruptable ──
  # Base (prod/main) ships a minAvailable:1 PDB. In dev the Deployment runs at
  # replicas:1, so a minAvailable:1 PDB would block node drains/rollouts (the
  # only pod can never be evicted). minAvailable:0 = no protection = freely
  # disruptable.
  - patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 0
    target:
      kind: PodDisruptionBudget
      name: orvex-wiki

# ═══════════════════════════════════════════════════════════════════════════
# Cell token (ENG-1505 fix-pass — single source). Substitutes the CELLTOKEN
# placeholders set by the patches above from orvex-wiki-env's CELL_TOKEN
# field, which the root kustomization.yaml relays from cluster-config.yaml's
# `cellToken` — the ONE place the literal short cell token is typed. This is
# the dev-overlay half of the same single-source chain the base
# app-manifests/httproute.yaml replacement uses for prod.
# ═══════════════════════════════════════════════════════════════════════════
replacements:
  - source:
      kind: ConfigMap
      name: orvex-wiki-env
      fieldPath: data.CELL_TOKEN
    targets:
      - select:
          kind: HTTPRoute
          name: orvex-wiki
        fieldPaths:
          - metadata.annotations.[external-dns.alpha.kubernetes.io/hostname]
          - spec.hostnames.0
        options:
          delimiter: "."
          index: 1
      - select:
          kind: HTTPRoute
          name: orvex-wiki
        fieldPaths:
          - spec.parentRefs.0.sectionName
        options:
          delimiter: "-"
          index: 1
      - select:
          kind: ConfigMap
          name: orvex-wiki-env
        fieldPaths:
          - data.APP_URL
        options:
          delimiter: "."
          index: 1
