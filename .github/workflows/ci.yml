# orvex-wiki CI — Foundation M4.
# Fast parallel gates fanned into the single required `ci-success` check.
# CS §13: CI VALIDATES ONLY — no image is ever built or pushed here; container
# images are built on-cluster by Tekton (tekton/) pushing to Harbor with
# GitOps auto-rollout. Live-infra suites (make smoke-test, make test-e2e) run
# against a real environment and are NOT CI jobs yet — see the foundation
# handoff for the promote-later plan (Houston e2e-gates pattern).
#
# RUNNERS — CS §13. orvex-wiki is the family's only PUBLIC repo (the AGPL
# engine), so its jobs run on `public-runners`: a DEDICATED, ephemeral,
# NON-privileged self-hosted runner group (ARC platform service in the my-idp
# repo, group scoped to ONLY orvex-wiki). It is deliberately isolated from the
# shared `runners` / `dind-runners` sets that serve the PRIVATE repos and hold
# cluster-admin + OpenBao access — untrusted public/fork CI never touches those.
# public-runners are single-use (minRunners 0), have NO dind, NO cluster/secret
# reach (no-perms SA), and are resource-capped. Fork/outside-collaborator PRs
# additionally require maintainer approval before a run starts (org setting).
# This repo's CI needs zero cluster access (lint/typecheck/test/build/
# kubeconform/audit only). Images stay Tekton-only regardless (never built in CI).

name: CI

on:
  push:
    branches:
      - main
      - dev
      - crew/**
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint gates
  # ---------------------------------------------------------------------------
  lint-client:
    name: Lint Client
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint (client)
        run: pnpm --dir apps/client lint

  lint-server:
    name: Lint Server
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint (server, check-only)
        run: pnpm --dir apps/server run lint:check

  lint-boundary:
    name: Import Boundary (M1 fence)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Mock-quarantine + AGPL import fence
        run: pnpm lint:boundary

  # ---------------------------------------------------------------------------
  # Typecheck + build
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace package dists (typecheck inputs)
        run: |
          pnpm --dir packages/editor-ext build
          pnpm --dir packages/base-formula build
      # This repo has flat, non-composite tsconfigs (no TS project
      # references), so plain per-app tsc is the correct form here; the
      # family "tsc -b, never --noEmit" lesson applies to reference graphs.
      - name: Typecheck client + server
        run: make typecheck

  build:
    name: Build
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Full monorepo build (nx)
        run: pnpm build

  # ---------------------------------------------------------------------------
  # Unit tests
  # ---------------------------------------------------------------------------
  test-client:
    name: Test Client (vitest)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Vitest
        run: pnpm --dir apps/client test

  test-server:
    name: Test Server (jest, CI set)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # test:ci excludes the 16 NAMED upstream never-green DI-scaffold specs
      # (upstream test debt, recorded in the foundation handoff). Full suite:
      # make test-server-full.
      - name: Jest (CI set)
        run: pnpm --dir apps/server run test:ci

  test-server-integration:
    name: Test Server (integration, testcontainers PG)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace package dists (test inputs)
        run: |
          pnpm --dir packages/editor-ext build
          pnpm --dir packages/base-formula build
      # ENG-1372: real-Postgres integration suite (testcontainers spins its
      # own container via the runner's Docker daemon).
      - name: Jest (integration, real Postgres via testcontainers)
        run: pnpm --dir apps/server run test:integration

  # ---------------------------------------------------------------------------
  # Smoke module hygiene (the live smoke RUN needs real infra; here we prove
  # the module compiles, vets and is gofmt-clean)
  # ---------------------------------------------------------------------------
  smoke-module:
    name: Smoke Module (build/vet/fmt)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: tests/smoke/go.sum
      - name: gofmt clean
        working-directory: tests/smoke
        run: test -z "$(gofmt -l .)"
      - name: go vet (compiles the test files)
        working-directory: tests/smoke
        run: go vet ./...

  # ---------------------------------------------------------------------------
  # Deploy-tree validation (BUILD-ONLY — never applies; CS §13)
  # ---------------------------------------------------------------------------
  k8s-validate:
    name: K8s Manifests (build-only)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install kustomize + kubeconform
        run: |
          go install sigs.k8s.io/kustomize/kustomize/v5@v5.8.1
          go install github.com/yannh/kubeconform/cmd/kubeconform@v0.7.0
      - name: kustomize build + kubeconform
        run: |
          "$(go env GOPATH)/bin/kustomize" build --load-restrictor LoadRestrictionsNone deploy/kustomize \
            | "$(go env GOPATH)/bin/kubeconform" -ignore-missing-schemas -summary

  # ---------------------------------------------------------------------------
  # Deploy render gate (ENG-1505 — M14 short-cell DNS/cert cutover). The named
  # binary DoD gate: renders base (prod) + base+components/staging (dev) with
  # the real kustomize binary and asserts every public hostname carries the
  # short cell token (wiki.eu1.orvex.{ai,dev}), never the AWS-AZ id
  # (eu-central-1), while cluster-config.yaml's internal AZ id stays put.
  # ---------------------------------------------------------------------------
  deploy-render-gate:
    name: Deploy Render Gate (hostname cutover)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: deploy/kustomize/go.sum
      - name: Install kustomize
        run: go install sigs.k8s.io/kustomize/kustomize/v5@v5.8.1
      - name: gofmt clean
        working-directory: deploy/kustomize
        run: test -z "$(gofmt -l .)"
      - name: go test (TestHttpRouteHostnameShortCellToken)
        working-directory: deploy/kustomize
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go test ./... -run TestHttpRouteHostnameShortCellToken -v

  # ---------------------------------------------------------------------------
  # Engine license guard (ENG-1381 — P10: no closed EE submodule/gitlink/
  # import re-enters the AGPL engine). Static gate: reads git metadata +
  # source only, never runs product code. Runner: public-runners (the dedicated
  # public-repo group), same as every other job in this file (see file header).
  # ---------------------------------------------------------------------------
  engine-license-guard:
    name: Engine License Guard (P10)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: EngineHasNoClosedSubmoduleSpec (shell gate)
        run: bash scripts/engine-license-guard.sh .

  # ---------------------------------------------------------------------------
  # AGPL §13 license-header gate (ENG-1491 — AC3). Static gate: every engine
  # `.ts` file under apps/server/src/orvex/ (non-spec) must carry the AGPL
  # license header (SPDX-License-Identifier: AGPL-3.0-only marker). Reads
  # source only, never runs product code.
  # ---------------------------------------------------------------------------
  license-header-check:
    name: License Header Check (AGPL §13)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - name: license-header-check.sh
        run: bash scripts/ci/license-header-check.sh .

  # ---------------------------------------------------------------------------
  # Engine-only import guard (ENG-1491 — AC4, Q22 slim-AGPL rule). Static gate:
  # no file under apps/server/src/orvex/ may import a closed-satellite family
  # package or a non-AGPL-compatible module. Reads source only, never runs
  # product code. Distinct from engine-license-guard.sh (ENG-1381, P10 —
  # upstream-EE-specific); this gate covers the family-satellite direction.
  # ---------------------------------------------------------------------------
  engine-only-import-guard:
    name: Engine-Only Import Guard (Q22)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - name: engine-only-import-guard.sh
        run: bash scripts/ci/engine-only-import-guard.sh .

  # ---------------------------------------------------------------------------
  # CS §13 build/CI substrate conformance (ENG-1386 — CI-config layer gate).
  # Static config scan: no hosted runners without a documented public-repo
  # exception, no image build/push in Actions, Tekton build+rollout present,
  # kustomize+kubeconform pass. Never executes product code.
  # ---------------------------------------------------------------------------
  ci-substrate-conformance:
    name: CI Substrate Conformance (CS §13)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install kustomize + kubeconform
        run: |
          go install sigs.k8s.io/kustomize/kustomize/v5@v5.8.1
          go install github.com/yannh/kubeconform/cmd/kubeconform@v0.7.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: ci-substrate-conformance.spec.sh
        run: bash scripts/test/ci-substrate-conformance.spec.sh .

  # ---------------------------------------------------------------------------
  # Security
  # ---------------------------------------------------------------------------
  security:
    name: Security (audit + govulncheck)
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: tests/smoke/go.sum
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high
      - name: govulncheck (smoke module)
        working-directory: tests/smoke
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  sbom-generation:
    name: SBOM Generation
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          "$HOME/.local/bin/syft" version
      - name: Generate + validate SBOM (CycloneDX + SPDX)
        run: |
          "$HOME/.local/bin/syft" dir:. -o cyclonedx-json=orvex-wiki-sbom-cyclonedx.json -o spdx-json=orvex-wiki-sbom-spdx.json
          python3 - <<'PYEOF'
          import json, sys
          cdx = json.load(open('orvex-wiki-sbom-cyclonedx.json'))
          assert cdx.get('bomFormat') == 'CycloneDX', 'invalid CycloneDX SBOM'
          assert cdx.get('components'), 'CycloneDX SBOM has no components'
          spdx = json.load(open('orvex-wiki-sbom-spdx.json'))
          assert 'spdxVersion' in spdx, 'invalid SPDX SBOM'
          assert spdx.get('packages'), 'SPDX SBOM has no packages'
          print('CycloneDX components:', len(cdx['components']))
          print('SPDX packages:', len(spdx['packages']))
          PYEOF
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            orvex-wiki-sbom-cyclonedx.json
            orvex-wiki-sbom-spdx.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Workflow lint
  # ---------------------------------------------------------------------------
  workflow-lint:
    name: Workflow Lint
    runs-on: public-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest
      - name: Run actionlint
        run: actionlint

  # ---------------------------------------------------------------------------
  # Family cell-contract gate (reusable workflow from the contracts seam).
  # NOT in the ci-success fan-in yet: first-ever cross-repo run — promote into
  # `needs:` once it has run green on real pushes (Houston promote-later
  # pattern). Repo passes it as of 2026-07-06 (operator ruling 3b: annotated
  # cell-lint-allow exceptions for crew public-ingress sibling URLs).
  # ---------------------------------------------------------------------------
  # cell-lint (family gate) is temporarily disabled: the cross-repo reusable-
  # workflow call fails orvex-wiki's whole workflow graph at build time (0 jobs
  # created), which would block this repo's own gates. Re-enable once the
  # cross-repo call is proven resolvable (org reusable-workflow access + a
  # clean cell-lint.yml on contracts' default branch). Tracked in the handoff.
  # cell-lint:
  #   uses: orvexai/orvex-studio-contracts/.github/workflows/cell-lint.yml@dev

  # ---------------------------------------------------------------------------
  # CI Success Gate — the single required check for branch protection.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    needs:
      - lint-client
      - lint-server
      - lint-boundary
      - typecheck
      - build
      - test-client
      - test-server
      - test-server-integration
      - smoke-module
      - k8s-validate
      - deploy-render-gate
      - engine-license-guard
      - license-header-check
      - engine-only-import-guard
      - ci-substrate-conformance
      - security
      - sbom-generation
      - workflow-lint
    runs-on: public-runners
    if: always()
    steps:
      - name: Check all gate results
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          echo "$RESULTS" | python3 - <<'PYEOF'
          import json, sys
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v.get('result') != 'success']
          for k, v in sorted(needs.items()):
              print(f"{k}: {v.get('result')}")
          if failed:
              print(f"\nCI FAILED: {', '.join(failed)}")
              sys.exit(1)
          print("\nCI PASSED: all gates green")
          PYEOF
